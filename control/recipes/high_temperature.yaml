# High Temperature Fiber
# Target application: aerospace insulation, industrial heat management
# Key performance: thermal stability above 700°C

name: high_temperature
fiber_class: high_temperature
description: >
  Basalt fiber with enhanced thermal stability for aerospace insulation
  and industrial heat management applications.

target_tensile_gpa: 2.5
target_modulus_gpa: 78.0
target_diameter_um: 11.0
target_thermal_c:   760.0

tol_tensile_gpa:   0.2
tol_modulus_gpa:   4.0
tol_diameter_um:   1.5
tol_thermal_c:     20.0

initial_temp_c:       1540.0
initial_draw_speed_ms: 9.0
initial_airflow_lpm:   35.0

max_temp_c:        1600.0
min_temp_c:        1480.0
max_draw_speed_ms: 14.0
