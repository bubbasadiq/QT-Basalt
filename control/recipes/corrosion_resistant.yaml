# Corrosion Resistant Fiber
# Target application: marine infrastructure, chemical processing

name: corrosion_resistant
fiber_class: corrosion_resistant
description: >
  Basalt fiber for marine and chemical processing environments
  requiring long-term resistance to acid and alkali exposure.

target_tensile_gpa: 2.7
target_modulus_gpa: 82.0
target_diameter_um: 14.0
target_thermal_c:   640.0

tol_tensile_gpa:   0.2
tol_modulus_gpa:   4.0
tol_diameter_um:   2.0
tol_thermal_c:     30.0

initial_temp_c:       1470.0
initial_draw_speed_ms: 11.0
initial_airflow_lpm:   44.0

max_temp_c:        1540.0
min_temp_c:        1410.0
max_draw_speed_ms: 16.0
