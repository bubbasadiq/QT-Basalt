version: "3.9"

services:

  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn qutlas.platform_api.app:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./data-pipeline/export:/app/data-pipeline/export
    environment:
      - QUTLAS_ENV=development
      - QUTLAS_LOG_LEVEL=INFO
      - SIMULATOR_ENABLED=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m qutlas.dashboard.operator --api http://api:8000
    depends_on:
      api:
        condition: service_healthy
    stdin_open: true
    tty: true

volumes:
  export_data:
